<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sherry 💗</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="floating-hearts" id="heartsContainer"></div>

    <div class="floating-emoji" style="top: 10%; left: 5%; animation-delay: 0s;">💌</div>
    <div class="floating-emoji" style="top: 20%; right: 8%; animation-delay: 2s;">🌸</div>
    <div class="floating-emoji" style="bottom: 15%; left: 10%; animation-delay: 4s;">✨</div>
    <div class="floating-emoji" style="top: 60%; right: 5%; animation-delay: 1s;">💕</div>
    <div class="floating-emoji" style="bottom: 30%; left: 3%; animation-delay: 3s;">🎀</div>
    <div class="floating-emoji" style="top: 40%; left: 8%; animation-delay: 5s;">💖</div>

    <div class="container">
        <button class="open-btn" id="openBtn" onclick="openCard()">
            💌 Open My Heart
        </button>

        <div class="card" id="mainCard">
            <div class="big-heart">💖</div>
            
            <div class="litmatch-badge">
                <span>🔥</span>
                <span>Matched on Litmatch</span>
            </div>
            
            <h1>For You, Sherry</h1>
            <div class="subtitle">My favorite online chat buddy 💗</div>
            
            <div class="message" id="typewriterText"></div>
            
            <div class="buttons" id="buttons">
                <button class="btn btn-yes" onclick="sayYes()">Yes, I like you too! 💘</button>
                <button class="btn btn-no" id="noBtn" onclick="sayNo()">Maybe... 🤔</button>
            </div>
            
            <div id="responseArea" style="display: none;">
                <div class="response-message" id="responseMsg"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
